name: Revisar avisos DHM

on:
  schedule:
    # Cada 3 horas
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-dhm:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install cheerio

      - name: Revisar avisos del DHM
        run: node check-dhm.mjs

      - name: Publicar cambios si hay novedades
        run: |
          git config user.name "notilea-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dhm-alertas.json
          if git diff --cached --quiet; then
            echo "Sin cambios, no se publica nada."
          else
            git commit -m "Actualizar avisos DHM"
            git push
          fi

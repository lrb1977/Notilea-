name: Actualizar noticias Notilea

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install rss-parser

      - name: Generar news.json desde Google Noticias
        run: node scripts/fetch-news.mjs

      - name: Publicar cambios si hay noticias nuevas
        run: |
          git config user.name "notilea-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "Sin cambios, no se publica nada."
          else
            git commit -m "Actualizar noticias del día"
            git push
          fi

name: Actualizar El Niño 2026

on:
  schedule:
    # Corre cada 2 días a las 12:00 UTC (08:00 en Paraguay).
    - cron: "0 12 */2 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-elnino:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install rss-parser

      - name: Generar elnino.json desde Google Noticias
        run: node fetch-elnino.mjs

      - name: Publicar cambios si hay noticias nuevas
        run: |
          git config user.name "notilea-bot"
          git config user.email "actions@users.noreply.github.com"
          git add elnino.json
          if git diff --cached --quiet; then
            echo "Sin cambios, no se publica nada."
          else
            git commit -m "Actualizar noticias de El Niño"
            git push
          fi
